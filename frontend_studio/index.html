<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Dubber & Translator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>

    <div id="studio-view" class="studio-container view-active">
        <header class="app-header studio-header">
            <div class="logo">
                <i class="fa-solid fa-scissors purple-glow" style="color: #00f2fe;"></i>
                <h1>JANUS AUDIO EDITOR</h1>
                <span class="badge" style="background: rgba(0, 242, 254, 0.2); color: #00f2fe;">v4.1</span>
            </div>
            <button id="btn-close-studio" class="glow-button"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</button>
        </header>

        <div class="studio-workspace">
            <div class="studio-left">
                <!-- Video player will be moved here dynamically by JS -->
                <div id="studio-video-wrapper" class="studio-video-wrapper"></div>
            </div>
            
            <div class="studio-right">
                <div class="inspector-panel">
                    <h3><i class="fa-solid fa-sliders"></i> AUDIO PROPERTIES</h3>
                    <p id="inspector-block-name" class="text-gray" style="margin-bottom: 15px;">Selecciona un bloque de audio en la línea de tiempo inferior...</p>
                    
                    <div class="inspector-content hidden" id="inspector-content">
                        <label id="lbl-transcript">TRANSCRIPT</label>
                        <textarea id="studio-textarea" rows="8"></textarea>
                        
                        <label style="margin-top: 15px; display: block;">IDIOMA ORIGINAL (SOURCE)</label>
                        <select id="select-studio-source-lang" class="studio-select" style="width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
                            <option value="English">🇬🇧 English</option>
                            <option value="Spanish">🇪🇸 Español</option>
                            <option value="Japanese">🇯🇵 日本語</option>
                            <option value="Portuguese">🇧🇷 Português</option>
                            <option value="French">🇫🇷 Français</option>
                            <option value="German">🇩🇪 Deutsch</option>
                            <option value="Italian">🇮🇹 Italiano</option>
                            <option value="Korean">🇰🇷 한국어</option>
                            <option value="Chinese">🇨🇳 中文</option>
                        </select>

                        <div class="inspector-actions" style="display: flex; gap: 10px; margin-top: 15px;">
                            <button id="btn-studio-play-orig" class="glow-button" style="flex:1; background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);"><i class="fa-solid fa-ear-listen"></i> Original</button>
                            <button id="btn-studio-play-dub" class="glow-button" style="flex:1; background: rgba(0, 242, 254, 0.1); border-color: rgba(0, 242, 254, 0.3); color: #00f2fe;"><i class="fa-solid fa-play"></i> Doblaje</button>
                        </div>

                        <label style="margin-top: 15px; display: block;">MODELO TTS</label>
                        <select id="select-studio-tts-model" class="studio-select" style="width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 4px;">
                            <optgroup label="Local (GPU, Clonación de Voz)">
                                <option value="openbmb/VoxCPM2">VoxCPM2</option>
                                <option value="VibeVoice-1.5B">VibeVoice 1.5B (Original)</option>
                                <option value="VibeVoice-2B">VibeVoice 2B (Alta Calidad)</option>
                                <option value="k2-fsa/OmniVoice">🌍 OmniVoice (600+ Idiomas - 0.6B)</option>
                            </optgroup>
                            <optgroup label="Online (Sin GPU, Voces Neurales)">
                                <option value="edge">🌐 Edge TTS (Microsoft Neural)</option>
                            </optgroup>
                        </select>
                        
                        <label style="margin-top: 15px; display: block;">VOZ (SPEAKER)</label>
                        <select id="select-studio-speaker" class="studio-select" style="width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
                            <option value="cloned_speaker">Voz Clonada (Extraída de esta frase)</option>
                            <optgroup label="Edge TTS - Español (Online)">
                                <option value="es-MX-DaliaNeural">🇲🇽 Dalia (Mujer, Mexicano)</option>
                                <option value="es-MX-JorgeNeural">🇲🇽 Jorge (Hombre, Mexicano)</option>
                                <option value="es-ES-ElviraNeural">🇪🇸 Elvira (Mujer, España)</option>
                                <option value="es-ES-AlvaroNeural">🇪🇸 Álvaro (Hombre, España)</option>
                                <option value="es-AR-ElenaNeural">🇦🇷 Elena (Mujer, Argentino)</option>
                                <option value="es-AR-TomasNeural">🇦🇷 Tomás (Hombre, Argentino)</option>
                            </optgroup>
                            <optgroup label="Voces de Doblaje (VoxCPM / VibeVoice)">
                                <option value="en-Frank_man">VoxCPM2 - Frank (Hombre, Madura)</option>
                                <option value="en-Carter_man">VoxCPM2 - Carter (Hombre, Joven)</option>
                                <option value="en-Grace_woman">VoxCPM2 - Grace (Mujer, Joven)</option>
                                <option value="en-Emma_woman">VoxCPM2 - Emma (Mujer, Profesional)</option>
                            </optgroup>
                            <optgroup label="OmniVoice - Diseño de Voz (600+ Idiomas)">
                                <option value="female, young adult">👩 Joven (Mujer)</option>
                                <option value="male, young adult">👨 Joven (Hombre)</option>
                                <option value="female, middle-aged">👩 Adulta (Mujer)</option>
                                <option value="male, low pitch">👨 Voz Grave (Hombre)</option>
                                <option value="female, high pitch">👩 Voz Aguda (Mujer)</option>
                                <option value="male, middle-aged, low pitch">👨 Voz Profunda (Hombre)</option>
                            </optgroup>
                            <optgroup label="TTS Rápido (Windows)">
                                <option value="windows_native">Windows Native (Velocidad Inmediata)</option>
                            </optgroup>
                        </select>
                        <audio id="studio-audio-player" class="hidden"></audio>
                        
                        <div class="control-group" style="margin-top: 12px;">
                            <label style="font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; display: block;">IAs de Post-Procesamiento</label>
                            <label class="checkbox-label"><input type="checkbox" id="chk-use-enhance" checked> Sanador IA</label>
                            <label class="checkbox-label"><input type="checkbox" id="chk-use-phonetic" checked> Fonética IA</label>
                            <label class="checkbox-label"><input type="checkbox" id="chk-use-sync" checked> Reductor IA</label>
                        </div>

                        <button id="btn-studio-regenerate" class="glow-button regenerate-btn" style="width: 100%; margin-top: 15px; background: linear-gradient(135deg, rgba(157, 78, 221, 0.6) 0%, rgba(0, 242, 254, 0.4) 100%);">
                            <i class="fa-solid fa-rotate"></i> Regenerate Audio (5s)
                        </button>
                        <button id="btn-studio-delete" class="glow-button delete-btn" style="width: 100%; margin-top: 10px; background: rgba(255, 77, 77, 0.15); border-color: rgba(255, 77, 77, 0.5); color: #ff4d4d; font-weight: 600;">
                            <i class="fa-solid fa-trash"></i> Eliminar Frase
                        </button>
                        <button id="btn-studio-retranscribe-single" class="glow-button" style="width: 100%; margin-top: 10px; background: rgba(255, 165, 0, 0.15); border-color: rgba(255, 165, 0, 0.5); color: #ffa500; font-weight: 600;">
                            <i class="fa-solid fa-magnifying-glass-plus"></i> Re-transcribir con WhisperX
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="studio-timeline-section">
            <div class="timeline-header">
                <h3><i class="fa-solid fa-timeline"></i> TIMELINE</h3>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-studio-split" class="glow-button" style="background: rgba(0, 242, 254, 0.15); border-color: rgba(0, 242, 254, 0.5); color: #00f2fe; font-weight: 600;">
                        <i class="fa-solid fa-scissors"></i> Split Frase
                    </button>
                    <button id="btn-studio-finalize" class="glow-button finish-btn" style="background: rgba(30, 215, 96, 0.2); border-color: rgba(30, 215, 96, 0.5); color: #1ed760;"><i class="fa-solid fa-film"></i> Ensamblar Video Final</button>
                </div>
            </div>
            
            <div class="timeline-container">
                <div class="timeline-track-labels">
                    <div class="track-label video-track">V1 | Video</div>
                    <div class="track-label dubbed-track" style="color: #00f2fe;">A1 | Doblaje</div>
                    <div class="track-label english-track" style="color: #9d4edd;">A2 | Original</div>
                </div>
                <div class="timeline-scroll-area" id="timeline-scroll-area">
                    <div class="timeline-ruler" id="timeline-ruler"></div>
                    <!-- Tracks -->
                    <div class="timeline-track" id="track-video">
                        <div class="timeline-block video-block" style="width: 100%;"></div>
                    </div>
                    <div class="timeline-track" id="track-dubbed"></div>
                    <div class="timeline-track" id="track-english"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
